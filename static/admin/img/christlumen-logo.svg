<svg width="200" height="60" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Cross/Light Symbol -->
  <circle cx="20" cy="30" r="12" fill="url(#logoGradient)" opacity="0.2"/>
  <path d="M 20 18 L 20 42" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <path d="M 8 30 L 32 30" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <circle cx="20" cy="30" r="3" fill="#fbbf24"/>

  <!-- Rays of light -->
  <path d="M 20 15 L 20 12" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <path d="M 20 48 L 20 45" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <path d="M 5 30 L 2 30" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <path d="M 38 30 L 35 30" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

  <!-- Text -->
  <text x="45" y="38" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="url(#textGradient)">
    Christlumen
  </text>
</svg>
